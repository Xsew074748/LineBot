services:

  # ── IT Monitor Bot ──────────────────────────────────────
  bot:
    build: .
    container_name: it-monitor-bot
    restart: always

    ports:
      - "3000:3000"

    # โหลด .env จากไฟล์ (ไม่ hardcode ค่าใน compose)
    env_file:
      - .env

    volumes:
      # ข้อมูล Runtime — เก็บถาวรนอก container
      - ./data:/app/data
      # Log files
      - ./logs:/app/logs
      # Mount .env เข้า container ด้วย — จำเป็นสำหรับ middleware/setupAuth.js
      # ซึ่งอ่านไฟล์ .env โดยตรงเพื่อดึง SETUP_PASSWORD_HASH
      - ./.env:/app/.env:ro
      # CA cert สำหรับ Omada self-signed TLS (optional)
      # ถ้าใช้: uncomment แล้วตั้ง OMADA_CA_CERT_PATH=/certs/omada-ca.crt ใน .env
      # - ./certs:/certs:ro

    # รอให้ network พร้อมก่อน (ไม่รอ cloudflared เพราะ bot ไม่ต้องการ)
    depends_on: []

    networks:
      - bot-net

  # ── Cloudflare Tunnel (Phase 2 — ยังไม่เปิดใช้) ──────────
  # เปิดใช้เมื่อ Docker bot ทำงานได้ปกติแล้ว และพร้อมเลิก PM2
  #
  # วิธีเปิดใช้:
  #   1. ไปที่ https://one.dash.cloudflare.com/ > Zero Trust > Tunnels
  #   2. สร้าง Tunnel ใหม่ > เลือก Docker > Copy token
  #   3. ใส่ใน .env: CLOUDFLARE_TUNNEL_TOKEN=<token>
  #   4. ตั้ง Public Hostname ชี้ไป http://bot:3000
  #   5. ปิด cloudflared ที่รันบน Windows (Task Scheduler) ก่อน
  #   6. Uncomment บล็อก cloudflared ด้านล่าง แล้วรัน: docker compose up -d
  #
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: it-monitor-cloudflared
  #   restart: always
  #   command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
  #   environment:
  #     - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
  #   depends_on:
  #     - bot
  #   networks:
  #     - bot-net

networks:
  bot-net:
    driver: bridge

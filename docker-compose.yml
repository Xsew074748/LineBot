services:

  # ── IT Monitor Bot ──────────────────────────────────────
  # ใช้ image จาก Docker Hub — แก้โค้ดแล้วต้อง build+push ใหม่:
  #   docker build -t phattadol358/netguard-ai:latest . && docker push phattadol358/netguard-ai:latest
  #   docker compose up -d --pull always
  line-bot:
    image: phattadol358/netguard-ai:latest
    container_name: it-monitor-bot
    restart: always

    # ภายนอก 3100 → ภายใน container 3000 (PORT ใน .env)
    ports:
      - "3100:3000"

    # โหลด .env จากไฟล์ (ไม่ hardcode ค่าใน compose)
    env_file:
      - .env

    volumes:
      # ข้อมูล Runtime — เก็บถาวรนอก container (users.json, notified_alerts.json)
      - ./data:/app/data
      # Log files
      - ./logs:/app/logs
      # Mount .env เข้า container ด้วย — จำเป็นสำหรับ middleware/setupAuth.js
      # ซึ่งอ่านไฟล์ .env โดยตรงเพื่อดึง SETUP_PASSWORD_HASH
      - ./.env:/app/.env:ro
      # CA cert สำหรับ Omada self-signed TLS (optional)
      # ถ้าใช้: uncomment แล้วตั้ง OMADA_CA_CERT_PATH=/certs/omada-ca.crt ใน .env
      # - ./certs:/certs:ro

    networks:
      - bot-net

  # ── Cloudflare Tunnel ────────────────────────────────────
  # ⚠️ ก่อน docker compose up ครั้งแรก:
  #   1. ปิด cloudflared ที่รันบน Windows (Task Scheduler) ก่อน — ห้ามรัน 2 ตัวพร้อมกัน
  #   2. แก้ C:\Users\phatt\.cloudflared\config.yml:
  #      - ingress service:     http://localhost:3000 → http://line-bot:3000
  #      - credentials-file:    C:\Users\phatt\... → /etc/cloudflared/<tunnel-id>.json
  #        (path ใน container — mount แบบ read-only ด้านล่าง)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: it-monitor-cloudflared
    restart: always
    depends_on:
      - line-bot
    volumes:
      - C:/Users/phatt/.cloudflared:/etc/cloudflared:ro
    # ใช้ tunnel id จาก config.yml โดยตรง (ไม่ระบุชื่อ กัน name mismatch)
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    networks:
      - bot-net

networks:
  bot-net:
    driver: bridge

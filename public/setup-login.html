<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Monitor Bot — Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #1E2761; --navy-d: #151d4e; --teal: #02C39A; --teal-d: #019a78;
    --white: #fff; --gray-100: #f4f6fb; --gray-300: #d0d5e3; --gray-600: #6b7280;
    --red: #e53e3e; --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  body {
    font-family: var(--font); background: var(--gray-100);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: var(--white); border-radius: 16px; box-shadow: 0 8px 40px rgba(30,39,97,.13);
    width: 100%; max-width: 400px; overflow: hidden;
  }
  .card-header {
    background: linear-gradient(135deg, var(--navy-d), var(--navy));
    padding: 40px 32px 32px; text-align: center; color: var(--white);
  }
  .logo { font-size: 48px; display: block; margin-bottom: 12px; }
  .card-header h1 { font-size: 20px; font-weight: 700; letter-spacing: .3px; }
  .card-header p { font-size: 13px; opacity: .7; margin-top: 4px; }
  .card-body { padding: 32px; }
  .alert-error {
    background: #fff5f5; border: 1px solid #fed7d7; color: var(--red);
    border-radius: 8px; padding: 10px 14px; font-size: 14px; margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }
  label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
  .input-wrap { position: relative; }
  input[type=password], input[type=text] {
    width: 100%; padding: 11px 44px 11px 14px; border: 1.5px solid var(--gray-300);
    border-radius: 8px; font-size: 15px; font-family: var(--font);
    outline: none; transition: border-color .2s;
  }
  input:focus { border-color: var(--teal); }
  .toggle-pw {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: var(--gray-600); font-size: 18px; padding: 4px;
  }
  .btn {
    display: block; width: 100%; padding: 13px; margin-top: 24px;
    background: var(--teal); color: var(--white); border: none; border-radius: 8px;
    font-size: 16px; font-weight: 700; cursor: pointer; letter-spacing: .3px;
    transition: background .2s, transform .1s;
  }
  .btn:hover { background: var(--teal-d); }
  .btn:active { transform: scale(.98); }
  .hint { margin-top: 20px; font-size: 12px; color: var(--gray-600); text-align: center; line-height: 1.7; }
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <span class="logo">🤖</span>
    <h1>IT Monitor Bot</h1>
    <p>Setup &amp; Settings — LAN Access Only</p>
  </div>
  <div class="card-body">
    <div id="errBox" class="alert-error" style="display:none">⚠️ รหัสผ่านไม่ถูกต้อง กรุณาลองใหม่</div>
    <form method="POST" action="/setup/login" id="loginForm">
      <label for="pw">รหัสผ่าน</label>
      <div class="input-wrap">
        <input type="password" id="pw" name="password" placeholder="กรอกรหัสผ่าน" autocomplete="current-password" required autofocus>
        <button type="button" class="toggle-pw" onclick="togglePw()" title="แสดง/ซ่อน">👁</button>
      </div>
      <button type="submit" class="btn">เข้าสู่ระบบ</button>
    </form>
    <p class="hint">รหัสเริ่มต้น: <strong>admin</strong><br>สามารถเปลี่ยนได้ใน Settings → Security</p>
  </div>
</div>
<script>
  const params = new URLSearchParams(location.search);
  if (params.get('error')) document.getElementById('errBox').style.display = 'flex';
  function togglePw() {
    const pw = document.getElementById('pw');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  }
</script>
</body>
</html>
